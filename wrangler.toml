name = "prudentia-digital-website"
main = "worker.js"
compatibility_date = "2026-04-12"

[build]
command = "npm run build"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"

# Retain Worker logs (console.* incl. EMAIL_DELIVERY_FAILURE) so they are queryable
# in Workers Logs and alertable. Without this, console output is visible only during
# a live `wrangler tail`. head_sampling_rate = 1 keeps 100% of invocations.
[observability]
enabled = true
head_sampling_rate = 1

# Cloudflare Email Service (Email Sending) binding — no API key needed.
# The from-domain must be onboarded first: npx wrangler email sending enable prudentiadigital.co.za
# (requires the account's Email Service beta opt-in in the dashboard).
[[send_email]]
name = "EMAIL"

# Non-secret config committed here so CI `wrangler deploy` (default --keep-vars=false)
# does NOT wipe it. The only remaining secret (HEALTH_TOKEN) is set via
# `wrangler secret put` / dashboard and is preserved across deploys.
[vars]
CONTACT_TO_ADDRESS = "masekolt@prudentiadigital.co.za"
EMAIL_FROM_ADDRESS = "contact-form@prudentiadigital.co.za"
# Auto-ack to the submitter requires the Workers Paid plan (free plan can only send
# to VERIFIED destination addresses — the visitor's address is arbitrary). Flip to
# "true" only after upgrading; the primary lead email is unaffected either way.
SEND_AUTO_ACK = "false"

# Per-IP submission throttle (5 / 10 min). Bound BEFORE sending went live so the
# form cannot be used as a mail-amplification vector.
[[kv_namespaces]]
binding = "FORM_RATELIMIT"
id = "9c9658ca81e74c0aaa42e9693eafd4bc"
