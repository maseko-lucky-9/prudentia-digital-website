name = "prudentia-digital-website"
main = "worker.js"
compatibility_date = "2026-04-12"
# nodejs_compat is required by worker-mailer (SMTP over Cloudflare TCP sockets).
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm run build"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"

# Retain Worker logs (console.* incl. EMAIL_DELIVERY_FAILURE) so they are queryable
# in Workers Logs and alertable. Without this, console output is visible only during
# a live `wrangler tail`. head_sampling_rate = 1 keeps 100% of invocations.
[observability]
enabled = true
head_sampling_rate = 1

# Email is sent via the GoDaddy/Titan SMTP relay the business already pays for
# (ADR-013) — no Cloudflare Email Service (paid-plan gated) and no third-party
# vendor. The ONLY sending secret is SMTP_PASSWORD (the mailbox password):
#   npx wrangler secret put SMTP_PASSWORD
# HEALTH_TOKEN (also a secret) gates /api/email-health.
#
# Non-secret config committed here so CI `wrangler deploy` (default
# --keep-vars=false) does NOT wipe it. Encrypted Secrets are preserved.
[vars]
CONTACT_TO_ADDRESS = "masekolt@prudentiadigital.co.za"
# GoDaddy's relay only sends from the AUTHENTICATED mailbox — keep these two equal.
SMTP_USERNAME = "masekolt@prudentiadigital.co.za"
EMAIL_FROM_ADDRESS = "masekolt@prudentiadigital.co.za"
SMTP_HOST = "smtpout.secureserver.net"
SMTP_PORT = "465"
# Courtesy receipt to the visitor (reply-to = company inbox). Free via the GoDaddy
# relay; flip to "false" to disable if relay quota or spam complaints become an issue.
SEND_AUTO_ACK = "true"

# Per-IP submission throttle (5 / 10 min). Bound BEFORE sending went live so the
# form cannot be used as a mail-amplification vector.
[[kv_namespaces]]
binding = "FORM_RATELIMIT"
id = "9c9658ca81e74c0aaa42e9693eafd4bc"
# Same namespace for `wrangler dev` so the rate limiter is exercisable locally.
preview_id = "9c9658ca81e74c0aaa42e9693eafd4bc"
