<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" role="img" aria-label="AI Agent Engineering outcome key-frame">
  <title>AI Agent Engineering — outcome key-frame</title>
  <desc>The single answer-line exits at the top with a quiet gold glow. Faint stack ghosts below suggest the loop's continuous nature.</desc>
  <!-- Faint ghosted stack below (memory of the queue) -->
  <line x1="60" y1="120" x2="180" y2="120" stroke="#0D1B2A" stroke-width="0.5" opacity="0.15"/>
  <line x1="60" y1="108" x2="180" y2="108" stroke="#0D1B2A" stroke-width="0.5" opacity="0.2"/>
  <line x1="60" y1="96" x2="180" y2="96" stroke="#0D1B2A" stroke-width="0.5" opacity="0.25"/>
  <line x1="60" y1="84" x2="180" y2="84" stroke="#0D1B2A" stroke-width="0.5" opacity="0.3"/>
  <!-- The vertical beam (faint, vestigial) -->
  <line x1="120" y1="40" x2="120" y2="80" stroke="#0D1B2A" stroke-width="0.5" opacity="0.2" stroke-dasharray="2 3"/>
  <!-- The answer-line (the outcome that exits at top) -->
  <line x1="48" y1="44" x2="192" y2="44" stroke="#0D1B2A" stroke-width="2" stroke-linecap="round"/>
  <!-- Gold glow around midpoint of answer-line -->
  <circle cx="120" cy="44" r="14" fill="none" stroke="#C9A96E" stroke-width="0.5" opacity="0.3"/>
  <circle cx="120" cy="44" r="9" fill="none" stroke="#C9A96E" stroke-width="0.75" opacity="0.5"/>
  <circle cx="120" cy="44" r="4" fill="#C9A96E"/>
</svg>
