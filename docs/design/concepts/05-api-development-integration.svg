<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" role="img" aria-label="API Development and Integration outcome key-frame">
  <title>API Development &amp; Integration — outcome key-frame</title>
  <desc>Three thin channels converge on the left into a single thicker stream on the right. Gold marker travels through the merged section.</desc>
  <!-- Three input channels (left half) -->
  <line x1="32" y1="56" x2="100" y2="56" stroke="#0D1B2A" stroke-width="1" opacity="0.5"/>
  <line x1="32" y1="80" x2="100" y2="80" stroke="#0D1B2A" stroke-width="1" opacity="0.5"/>
  <line x1="32" y1="104" x2="100" y2="104" stroke="#0D1B2A" stroke-width="1" opacity="0.5"/>
  <!-- Convergence curves -->
  <path d="M 100 56 C 124 56, 124 80, 140 80" fill="none" stroke="#0D1B2A" stroke-width="1" opacity="0.5"/>
  <path d="M 100 104 C 124 104, 124 80, 140 80" fill="none" stroke="#0D1B2A" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="80" x2="140" y2="80" stroke="#0D1B2A" stroke-width="1" opacity="0.5"/>
  <!-- Merged stream (thicker, settled) -->
  <line x1="140" y1="80" x2="208" y2="80" stroke="#0D1B2A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Gold marker mid-flow (outcome accent) -->
  <circle cx="174" cy="80" r="4" fill="#C9A96E"/>
  <circle cx="174" cy="80" r="8" fill="none" stroke="#C9A96E" stroke-width="0.5" opacity="0.4"/>
</svg>
